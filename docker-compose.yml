services:
  backend:
    build:
      context: ./server
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      SECRET_KEY: django-insecure-change-this-in-production
      DEBUG: "True"
      ALLOWED_HOSTS: "127.0.0.1,localhost,testserver,0.0.0.0,backend"
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: Organization_New_Personal_DB
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: host.docker.internal
      DB_PORT: "5432"
      ACCESS_TOKEN_MINUTES: "60"
      REFRESH_TOKEN_DAYS: "1"
    ports:
      - "8000:8000"
    volumes:
      - ./server/media:/app/media
      - ./server/staticfiles:/app/staticfiles

  login:
    build:
      context: ./login
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3020:3020"

  hospital:
    build:
      context: ./hospital-management
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3012:3012"

  school:
    build:
      context: ./school-management
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3021:3021"

  clinic:
    build:
      context: ./clinic-management
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3013:3013"

